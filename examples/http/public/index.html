<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RTSP Viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #101014;
        color: #cfcfd6;
        font:
          14px/1.4 system-ui,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 20px;
        box-sizing: border-box;
      }

      form {
        display: flex;
        gap: 8px;
        width: min(720px, 100%);
      }

      input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #33333d;
        background: #1a1a20;
        color: #eee;
      }

      button {
        padding: 10px 18px;
        border-radius: 8px;
        border: 0;
        cursor: pointer;
        background: #4f6ef7;
        color: #fff;
        font-weight: 600;
      }

      button.stop {
        background: #444;
      }

      button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      #status {
        min-height: 1.2em;
        color: #8a8a94;
      }

      #status.err {
        color: #ff7676;
      }

      canvas {
        width: min(960px, 100%);
        background: #000;
        border-radius: 10px;
        aspect-ratio: 16 / 9;
        object-fit: contain;
      }
    </style>
  </head>

  <body>
    <form id="form">
      <input
        id="rtspUrl"
        type="text"
        placeholder="rtsp://user:pass@192.168.1.10:554/stream1"
        autocomplete="off"
        spellcheck="false"
        required
      />
      <button id="playBtn" type="submit">Play</button>
      <button id="stopBtn" type="button" class="stop" disabled>Stop</button>
    </form>
    <div id="status">enter an RTSP URL and press Play</div>
    <canvas id="video"></canvas>
    <script src="client.js"></script>
  </body>
</html>
